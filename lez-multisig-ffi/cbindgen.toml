# cbindgen configuration for lez-multisig FFI
# Generates lez_multisig.h from Rust extern "C" symbols

language = "C"
style = "both"
cpp_compat = true
include_guard = "LEZ_MULTISIG_H"
autogen_warning = "/* Auto-generated by cbindgen. Do not edit manually. */\n"

[export]
# The multisig_program_* symbols in src/multisig.rs are generated implementation
# details that change with the IDL. Exclude them so only the stable lez_multisig_*
# wrapper API is part of the public C ABI.
# NOTE: if the IDL gains new instructions, add their multisig_program_* names here
# and run `make generate-header` to keep the committed header in sync.
exclude = [
  "multisig_program_create_multisig",
  "multisig_program_propose",
  "multisig_program_approve",
  "multisig_program_reject",
  "multisig_program_execute",
  "multisig_program_propose_add_member",
  "multisig_program_propose_remove_member",
  "multisig_program_propose_change_threshold",
  "multisig_program_free_string",
  "multisig_program_version",
]
