# cbindgen configuration for lez-multisig FFI
# Generates lez_multisig.h from Rust extern "C" symbols

language = "C"
style = "both"
include_version = true
include_guard = "LEZ_MULTISIG_H"
after_includes = true
autogen_warning = "/* Auto-generated by cbindgen. Do not edit manually. */\n"

[export]
exclude = ["__*"]
rename = { }

[fn]
args = "forward"
recursion_limit = 256

[parse]
parse_deps = false
include = ["spel-framework-core", "nssa_core"]
